name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install skills-ref

      - name: Validate marketplace JSON files
        run: |
          jq empty .claude-plugin/marketplace.json && echo "✓ .claude-plugin/marketplace.json"
          jq empty .cursor-plugin/plugin.json      && echo "✓ .cursor-plugin/plugin.json"
          jq empty .codex-plugin/plugin.json       && echo "✓ .codex-plugin/plugin.json"

      - name: Validate all skills
        run: |
          exit_code=0
          while IFS= read -r skill_file; do
            skill_dir=$(dirname "$skill_file")
            skill_name=$(basename "$skill_dir")
            echo "Validating $skill_name..."
            if ! agentskills validate "$skill_dir"; then
              echo "::error::Skill '$skill_name' failed validation"
              exit_code=1
            fi
          done < <(find skills -name "SKILL.md")
          exit $exit_code

  release-prep:
    name: Prepare release PR
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      - name: Update plugin manifests and tile version
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          for manifest in ".claude-plugin/plugin.json" ".cursor-plugin/plugin.json" ".codex-plugin/plugin.json"; do
            jq ".version = \"${TAG#v}\"" "${manifest}" > "${manifest}.tmp"
            mv "${manifest}.tmp" "${manifest}"
          done
          jq ".version = \"${TAG#v}\"" tile.json > tile.json.tmp
          mv tile.json.tmp tile.json

      - name: Update CHANGELOG.md
        env:
          TAG: ${{ steps.version.outputs.tag }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          [ "$LAST_TAG" = "v0.0.0" ] && RANGE="HEAD" || RANGE="${LAST_TAG}..HEAD"

          FEATS=""
          FIXES=""
          OTHER=""

          while IFS= read -r line || [ -n "$line" ]; do
            summary=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?!?: //')
            case "$line" in
              feat*)  FEATS="${FEATS}- ${summary}\n" ;;
              fix*)   FIXES="${FIXES}- ${summary}\n" ;;
              *)      OTHER="${OTHER}- ${summary}\n" ;;
            esac
          done < <(git log --pretty=format:"%s" "$RANGE")

          generate_entry() {
            echo "## ${TAG} ($(date +%Y-%m-%d))"
            echo ""
            [ -n "$FEATS" ] && { echo "### Added"; echo ""; echo -e "$FEATS"; }
            [ -n "$FIXES" ] && { echo "### Fixed"; echo ""; echo -e "$FIXES"; }
            [ -n "$OTHER" ] && { echo "### Changed"; echo ""; echo -e "$OTHER"; }
          }

          if [ -f CHANGELOG.md ]; then
            {
              head -1 CHANGELOG.md
              echo ""
              generate_entry
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              generate_entry
            } > CHANGELOG.md
          fi

      - name: Create release branch and commit
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git push origin --delete "release/${TAG}" 2>/dev/null || true
          git checkout -b "release/${TAG}"
          git push --set-upstream origin "release/${TAG}"

          HEAD_OID=$(git rev-parse HEAD)
          CLAUDE_PLUGIN=$(base64 -w0 .claude-plugin/plugin.json)
          CURSOR_PLUGIN=$(base64 -w0 .cursor-plugin/plugin.json)
          CODEX_PLUGIN=$(base64 -w0 .codex-plugin/plugin.json)
          CHANGELOG=$(base64 -w0 CHANGELOG.md)
          TILE=$(base64 -w0 tile.json)

          # shellcheck disable=SC2016
          gh api graphql -f query='
            mutation($repo: String!, $branch: String!, $oid: GitObjectID!,
                     $headline: String!, $cp: Base64String!, $crp: Base64String!, $cxp: Base64String!, $cl: Base64String!, $tj: Base64String!) {
              createCommitOnBranch(input: {
                branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                message: { headline: $headline },
                expectedHeadOid: $oid,
                fileChanges: {
                  additions: [
                    { path: ".claude-plugin/plugin.json", contents: $cp },
                    { path: ".cursor-plugin/plugin.json", contents: $crp },
                    { path: ".codex-plugin/plugin.json", contents: $cxp },
                    { path: "CHANGELOG.md", contents: $cl },
                    { path: "tile.json", contents: $tj }
                  ]
                }
              }) { commit { url } }
            }' \
            -f repo="${REPO}" \
            -f branch="release/${TAG}" \
            -f oid="${HEAD_OID}" \
            -f headline="chore: release ${TAG}" \
            -f cp="${CLAUDE_PLUGIN}" \
            -f crp="${CURSOR_PLUGIN}" \
            -f cxp="${CODEX_PLUGIN}" \
            -f cl="${CHANGELOG}" \
            -f tj="${TILE}"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh pr create \
            --title "chore: release ${TAG}" \
            --body "Automated release PR for ${TAG}.

          **Changes include:**
          - Updated plugin manifests to \`${TAG#v}\`
          - Updated tile.json to \`${TAG#v}\`
          - Updated CHANGELOG.md

          Merging this PR will create the git tag, GitHub release, and publish the Tessl tile." \
            --base master \
            --head "release/${TAG}"
