name: Validate Skills

on:
  push:
    branches:
      - master
    paths:
      - "skills/**"
      - "tile.json"
      - ".claude-plugin/**"
      - ".cursor-plugin/**"
      - ".codex-plugin/**"
  pull_request:
    branches:
      - master
    paths:
      - "skills/**"
      - "tile.json"
      - ".claude-plugin/**"
      - ".cursor-plugin/**"
      - ".codex-plugin/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Check skill spec compliance
    runs-on: ubuntu-latest
    env:
      TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate marketplace JSON files
        run: |
          echo "Validating marketplace JSON files..."
          jq empty .claude-plugin/marketplace.json && echo "✓ .claude-plugin/marketplace.json"
          jq empty .cursor-plugin/plugin.json      && echo "✓ .cursor-plugin/plugin.json"
          jq empty .codex-plugin/plugin.json       && echo "✓ .codex-plugin/plugin.json"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install skills-ref

      - name: Validate all skills
        run: |
          exit_code=0
          while IFS= read -r skill_file; do
            skill_dir=$(dirname "$skill_file")
            skill_name=$(basename "$skill_dir")
            echo "Validating $skill_name..."
            if ! agentskills validate "$skill_dir"; then
              echo "::error::Skill '$skill_name' failed validation"
              exit_code=1
            fi
          done < <(find skills -name "SKILL.md")
          exit $exit_code

      - name: Review and optimize skills
        if: ${{ env.TESSL_TOKEN != '' && github.event_name == 'pull_request' }}
        uses: tesslio/skill-review-and-optimize@2a22a9760c3990cd1a67fb391f18939363c9d5f8
        with:
          optimize: false
          tessl-token: ${{ env.TESSL_TOKEN }}

      - name: Lint tile
        if: ${{ env.TESSL_TOKEN != '' }}
        run: tessl tile lint
