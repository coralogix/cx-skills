name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Create tag and GitHub release
    if: startsWith(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: version
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          TAG=$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | grep -oP 'v\d+\.\d+\.\d+')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

  publish-tile:
    name: Publish Tessl tile
    needs: tag-and-release
    if: startsWith(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Tessl CLI
        if: env.TESSL_TOKEN != ''
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ env.TESSL_TOKEN }}

      - name: Lint tile
        if: env.TESSL_TOKEN != ''
        run: tessl tile lint

      - name: Publish tile
        if: env.TESSL_TOKEN != ''
        run: tessl tile publish
        
      - name: Skip publish when token is missing
        if: env.TESSL_TOKEN == ''
        run: echo "TESSL_TOKEN is not configured; skipping Tessl tile publish."
